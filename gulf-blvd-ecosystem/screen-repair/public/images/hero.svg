<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B4A6B"/>
      <stop offset="100%" style="stop-color:#0d2d42"/>
    </linearGradient>
    <pattern id="mesh" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M0 0 L30 0 M0 10 L30 10 M0 20 L30 20 M0 30 L30 30 M0 0 L0 30 M10 0 L10 30 M20 0 L20 30 M30 0 L30 30" stroke="rgba(255,255,255,0.06)" stroke-width="0.8" fill="none"/>
    </pattern>
  </defs>
  <!-- Background gradient -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Mesh pattern overlay -->
  <rect width="1200" height="630" fill="url(#mesh)"/>
  <!-- Decorative accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="#4BA3C7" opacity="0.8"/>
  <!-- Decorative circle -->
  <circle cx="980" cy="315" r="260" fill="rgba(75,163,199,0.07)"/>
  <circle cx="980" cy="315" r="180" fill="rgba(75,163,199,0.06)"/>
  <!-- Main headline -->
  <text x="100" y="240" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="bold" fill="#FFFFFF" letter-spacing="-1">Pool Cage Rescreening</text>
  <!-- Subheadline -->
  <text x="100" y="320" font-family="Arial, Helvetica, sans-serif" font-size="32" fill="rgba(255,255,255,0.85)" letter-spacing="0.5">Gulf Blvd &#x2022; Indian Rocks Beach to Clearwater Beach</text>
  <!-- Divider line -->
  <rect x="100" y="350" width="120" height="4" fill="#4BA3C7" rx="2"/>
  <!-- Phone number -->
  <text x="100" y="420" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="bold" fill="#4BA3C7" letter-spacing="1">(727) 555-0100</text>
  <!-- Tagline -->
  <text x="100" y="480" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="rgba(255,255,255,0.65)">Licensed &amp; Insured &#x2022; Free Estimates &#x2022; Storm Damage Experts</text>
  <!-- Domain -->
  <text x="100" y="580" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="rgba(255,255,255,0.45)">gulfblvdrescreening.com</text>
</svg>
