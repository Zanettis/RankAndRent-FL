<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D5016"/>
      <stop offset="100%" style="stop-color:#1a2e0d"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="rgba(255,255,255,0.05)"/>
    </pattern>
  </defs>
  <!-- Background gradient -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Dot pattern overlay -->
  <rect width="1200" height="630" fill="url(#dots)"/>
  <!-- Decorative accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="#7EC850" opacity="0.8"/>
  <!-- Decorative circle -->
  <circle cx="980" cy="315" r="260" fill="rgba(126,200,80,0.07)"/>
  <circle cx="980" cy="315" r="180" fill="rgba(126,200,80,0.06)"/>
  <!-- Main headline -->
  <text x="100" y="240" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="bold" fill="#FFFFFF" letter-spacing="-1">Tree Removal &amp; Trimming</text>
  <!-- Subheadline -->
  <text x="100" y="320" font-family="Arial, Helvetica, sans-serif" font-size="32" fill="rgba(255,255,255,0.85)" letter-spacing="0.5">Gulf Blvd &#x2022; ISA-Certified Arborists</text>
  <!-- Divider line -->
  <rect x="100" y="350" width="120" height="4" fill="#7EC850" rx="2"/>
  <!-- Phone number -->
  <text x="100" y="420" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="bold" fill="#7EC850" letter-spacing="1">(727) 555-0326</text>
  <!-- Tagline -->
  <text x="100" y="480" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="rgba(255,255,255,0.65)">Licensed &amp; Insured &#x2022; Free Estimates &#x2022; 24/7 Emergency Line</text>
  <!-- Domain -->
  <text x="100" y="580" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="rgba(255,255,255,0.45)">gulfblvdtreeexperts.com</text>
</svg>
